server {
  listen 8080;
  server_name localhost;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;

    # 安全头
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "DENY";
  }

  location /healthz {
    access_log off;
    return 200 'OK';
  }
}