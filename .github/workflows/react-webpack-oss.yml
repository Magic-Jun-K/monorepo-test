name: 前端react-webpack部署流程-阿里云OSS

env:
  NODE_VERSION: '22'
  PNPM_VERSION: ''
  APP_NAME: 'react-webpack'
  TURBO_TELEMETRY_DISABLED: 1

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/frontend/react-webpack/**'
      - 'packages/**'
      - '.github/workflows/react-webpack-oss.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/frontend/react-webpack/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Dependencies
        run: |
          pnpm --filter @eggshell/ui-antd build
          pnpm --filter @eggshell/ui-tailwind build
          pnpm --filter @eggshell/ui-unocss build
          pnpm --filter @eggshell/core-business-components build
          pnpm --filter @eggshell/shared-crypto build

      - name: Type Check
        run: pnpm --filter @frontend/react-webpack typecheck

      - name: Lint Check
        run: pnpm --filter @frontend/react-webpack lint

      - name: Unit Tests
        run: pnpm test:react-webpack -- --coverage

      - name: Build Test
        run: pnpm build:react-webpack

      - name: Upload Coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/coverage-final.json
          flags: react-webpack
          name: codecov-react-webpack-oss
          fail_ci_if_error: false

  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Dependencies
        run: |
          pnpm --filter @eggshell/ui-antd build
          pnpm --filter @eggshell/ui-tailwind build
          pnpm --filter @eggshell/ui-unocss build
          pnpm --filter @eggshell/core-business-components build
          pnpm --filter @eggshell/shared-crypto build

      - name: Quality Checks
        run: |
          pnpm --filter @frontend/react-webpack typecheck
          pnpm --filter @frontend/react-webpack lint

      - name: Build Application
        run: pnpm build:react-webpack

      # ========== 安装 ossutil v2 ==========
      - name: Install ossutil v2
        run: |
          set -euo pipefail
          mkdir -p ~/bin
          curl -fsSL -o /tmp/ossutil.zip "https://gosspublic.alicdn.com/ossutil/v2/2.2.2/ossutil-2.2.2-linux-amd64.zip"
          unzip -o /tmp/ossutil.zip -d /tmp/
          chmod +x /tmp/ossutil-2.2.2-linux-amd64/ossutil
          mv /tmp/ossutil-2.2.2-linux-amd64/ossutil ~/bin/ossutil
          export PATH="$HOME/bin:$PATH"
          ossutil version

      - name: Configure ossutil
        run: |
          export PATH="$HOME/bin:$PATH"
          
          cat > ~/.ossutilconfig << EOF
          [Credentials]
              language = EN
              region = ${{ secrets.OSS_REGION }}
              endpoint = ${{ secrets.OSS_REGION }}.aliyuncs.com
              accessKeyID = ${{ secrets.OSS_ACCESS_KEY_ID }}
              accessKeySecret = ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          EOF

      # ========== 部署到 OSS ==========
      - name: Deploy to Aliyun OSS
        run: |
          set -euo pipefail
          export PATH="$HOME/bin:$PATH"

          DIST_DIR="${{ github.workspace }}/apps/frontend/react-webpack/dist"
          OSS_BUCKET="${{ secrets.OSS_BUCKET }}"
          OSS_REGION="${{ secrets.OSS_REGION }}"

          echo "=== Deployment Configuration ==="
          echo "BUCKET: ${OSS_BUCKET}"
          echo "REGION: ${OSS_REGION}"
          echo "DIST_DIR: ${DIST_DIR}"
          echo "DEPLOY_ENV: ${{ env.DEPLOY_ENV }}"
          echo "================================"

          if [ -z "${OSS_BUCKET}" ]; then
            echo "ERROR: OSS_BUCKET secret is not set or is empty"
            exit 1
          fi

          if [ -z "${OSS_REGION}" ]; then
            echo "ERROR: OSS_REGION secret is not set or is empty"
            exit 1
          fi

          echo "=== Checking build output ==="
          if [ ! -d "${DIST_DIR}" ]; then
            echo "ERROR: ${DIST_DIR} does not exist or is not a directory"
            echo "Listing contents of apps/frontend/react-webpack/:"
            ls -la "${{ github.workspace }}/apps/frontend/react-webpack/" 2>/dev/null || echo "Directory not found"
            exit 1
          fi

          echo "Contents of ${DIST_DIR}:"
          ls -la "${DIST_DIR}/" | head -20
          echo "================================"

          TARGET="oss://${OSS_BUCKET}/react-webpack/${{ env.DEPLOY_ENV }}"

          echo "🚀 Deploying to ${TARGET}"

          # Step 0: 测试 ossutil 连接性
          echo "🔗 Testing ossutil connection..."
          ossutil ls "oss://${OSS_BUCKET}/" || {
            echo "ERROR: Cannot connect to OSS bucket"
            echo "Possible causes:"
            echo "  1. Wrong bucket name"
            echo "  2. Wrong region"
            echo "  3. AccessKey has no permission"
            exit 1
          }

          # Step 1: 上传所有文件到 OSS（带重试）
          echo "📦 Uploading all files..."
          ossutil cp "${DIST_DIR}/" "${TARGET}/" \
            --recursive \
            --force \
            --parallel 20

          # Step 2: 设置静态资源长期缓存（带 hash 的文件）
          echo "⚙️ Setting long cache headers for hashed assets..."
          ossutil set-meta "${TARGET}/" \
            "Cache-Control:public, max-age=31536000, immutable" \
            -r -f \
            --include "*.js" \
            --include "*.css" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.jpeg" \
            --include "*.gif" \
            --include "*.svg" \
            --include "*.ico" \
            --include "*.woff" \
            --include "*.woff2" \
            --include "*.ttf" \
            --include "*.eot" \
            --include "*.webp" \
            --include "*.map"

          # Step 3: 设置 HTML 不缓存
          echo "⚙️ Setting no-cache headers for HTML files..."
          ossutil set-meta "${TARGET}/" \
            "Cache-Control:no-cache, no-store, must-revalidate" \
            -r -f \
            --include "*.html"

          # Step 4: 清理旧的 hash 文件（可选）
          echo "🧹 Cleaning stale files..."
          ossutil rm "${TARGET}/" \
            --recursive \
            --include "*.js" \
            --include "*.css" \
            --include "*.map" \
            --force 2>/dev/null || true

          # Step 5: 重新同步确保一致性
          echo "🔄 Final sync..."
          ossutil cp "${DIST_DIR}/" "${TARGET}/" \
            --recursive \
            --force \
            --parallel 20

          # Step 6: 重新设置缓存头（因为同步可能覆盖了元数据）
          echo "⚙️ Re-applying cache headers after sync..."
          ossutil set-meta "${TARGET}/" \
            "Cache-Control:public, max-age=31536000, immutable" \
            -r -f \
            --include "*.js" \
            --include "*.css" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.jpeg" \
            --include "*.gif" \
            --include "*.svg" \
            --include "*.ico" \
            --include "*.woff" \
            --include "*.woff2" \
            --include "*.ttf" \
            --include "*.eot" \
            --include "*.webp" \
            --include "*.map"

          ossutil set-meta "${TARGET}/" \
            "Cache-Control:no-cache, no-store, must-revalidate" \
            -r -f \
            --include "*.html"

          echo "✅ Deployment completed!"
          echo "🌐 https://${OSS_BUCKET}.${OSS_REGION}.aliyuncs.com/react-webpack/${{ env.DEPLOY_ENV }}/"

      # ========== 部署验证 ==========
      - name: Verify Deployment
        run: |
          set -euo pipefail

          OSS_BUCKET="${{ secrets.OSS_BUCKET }}"
          OSS_REGION="${{ secrets.OSS_REGION }}"
          DEPLOY_URL="https://${OSS_BUCKET}.${OSS_REGION}.aliyuncs.com/react-webpack/${{ env.DEPLOY_ENV }}/index.html"

          echo "🔍 Verifying: ${DEPLOY_URL}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${DEPLOY_URL}" || echo "000")

          if [ "${HTTP_CODE}" = "200" ]; then
            echo "✅ Deployment verified! HTTP ${HTTP_CODE}"
          else
            echo "⚠️ Verification returned HTTP ${HTTP_CODE}"
            echo "Please check OSS bucket manually."
          fi
