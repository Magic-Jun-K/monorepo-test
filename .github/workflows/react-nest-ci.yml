name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 安装 pnpm
      - name: Install pnpm(安装 pnpm)
        uses: pnpm/action-setup@v4
        # 不指定版本，让 pnpm 自动检测
        # with:
        #   version: 10.6.2

      # 设置 Node.js 环境
      - name: Set up Node.js(设置 Node.js 环境)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 依赖缓存优化
      - name: Cache pnpm modules(依赖缓存优化)
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # 后端测试
      - name: Backend Tests(后端测试)
        run: |
          cd apps/backend/baidu-map-nest
          pnpm install
          pnpm test

      # 前端测试
      - name: Frontend Tests(前端测试)
        run: |
          cd apps/frontend/baidu-map-react
          pnpm install
        # pnpm test

      # 登录到 GitHub Container Registry
      - name: Login to GitHub Container Registry(登录到 GitHub Container Registry)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并推送后端镜像
      - name: Build and push backend image(构建并推送后端镜像)
        uses: docker/build-push-action@v6
        with:
          context: apps/backend/baidu-map-nest
          file: apps/backend/baidu-map-nest/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner | lower }}/baidu-map-nest:latest

      # 构建并推送前端镜像
      - name: Build and push frontend image(构建并推送前端镜像)
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend/baidu-map-react
          file: apps/frontend/baidu-map-react/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner | lower }}/baidu-map-react:latest

      # 部署到服务器（使用 SSH）
      - name: Deploy to server()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/eggshell
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker-compose -f docker-compose.yml -f docker-compose.deploy.yml pull
            docker-compose -f docker-compose.yml -f docker-compose.deploy.yml up -d
