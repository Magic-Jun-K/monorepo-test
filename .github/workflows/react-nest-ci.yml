name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 安装 pnpm
      - name: Install pnpm(安装 pnpm)
        uses: pnpm/action-setup@v4
        # 不指定版本，让 pnpm 自动检测
        # with:
        #   version: 10.8.0

      # 设置 Node.js 环境
      - name: Set up Node.js(设置 Node.js 环境)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 依赖缓存优化
      - name: Cache pnpm modules(依赖缓存优化)
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # 后端测试
      - name: Backend Tests(后端测试)
        run: |
          cd apps/backend/baidu-map-nest
          pnpm install
          pnpm test

      # 前端测试
      - name: Frontend Tests(前端测试)
        run: |
          cd apps/frontend/baidu-map-react
          pnpm install
        # pnpm test

      # 登录到 GitHub Container Registry
      - name: Login to GitHub Container Registry(登录到 GitHub Container Registry)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # 设置用户名变量（小写）
      - name: Set lowercase actor
        run: echo "ACTOR_LOWER=$(echo ${{ github.actor }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 构建并推送后端镜像
      - name: Build and push backend image(构建并推送后端镜像)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/backend/baidu-map-nest/Dockerfile
          push: true
          tags: ghcr.io/${{ env.ACTOR_LOWER }}/baidu-map-nest:latest

      # 构建并推送前端镜像
      - name: Build and push frontend image(构建并推送前端镜像)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/baidu-map-react/Dockerfile
          push: true
          tags: ghcr.io/${{ env.ACTOR_LOWER }}/baidu-map-react:latest
          # 添加构建参数，启用详细日志
          build-args: |
            NODE_ENV=production
            VERBOSE=true

      # 部署到服务器（使用 SSH）
      - name: Deploy to server(部署到服务器)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/eggshell
            # 不使用代理登录 GitHub Container Registry
            unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取并启动容器
            docker-compose -f docker-compose.yml -f docker-compose.deploy.yml pull
            docker-compose -f docker-compose.yml -f docker-compose.deploy.yml up -d
