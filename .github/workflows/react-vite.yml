name: 前端react-vite部署流程

on:
  push:
    branches: [main, master] # 只在 main 和 master 分支上触发
    paths:
      - 'apps/frontend/react-vite/**' # 只在 apps/frontend/react-vite 目录下的文件发生变化时触发
      - 'packges/**' # 只在 packages 目录下的文件发生变化时触发
      - '.github/workflows/react-vite.yml' # 只在该工作流文件发生变化时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 运行 Common Steps
      - name: Run Common Steps
        uses: ./.github/actions/common-steps
        with:
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      # 前端测试
      # - name: Frontend Tests(前端测试)
      #   run: |
      #     cd apps/frontend/react-vite
      #     pnpm install
      # pnpm test

      # 构建并推送前端镜像
      - name: Build and push frontend image(构建并推送前端镜像)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/react-vite/Dockerfile
          push: true
          # tags: ghcr.io/Magic-Jun-K/react-vite:latest
          tags: ${{ secrets.ALIYUN_ACR_REGISTRY }}/eggshell/react-vite:${{ github.sha }}
          # 添加构建参数，启用详细日志
          # VERBOSE=true 启用详细日志
          build-args: |
            NODE_ENV=production
            VERBOSE=true

