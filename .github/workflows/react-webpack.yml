name: 前端react-webpack部署流程

# 环境变量
env:
  NODE_VERSION: '22'
  PNPM_VERSION: ''
  # 镜像仓库名称
  REGISTRY_NAME: 'eggshell'
  APP_NAME: 'react-webpack'
  # 启用 Docker BuildKit 来提高构建效率
  DOCKER_BUILDKIT: '1'
  # 启用 Docker Compose 的 BuildKit 功能
  COMPOSE_DOCKER_CLI_BUILD: '1'
  # 禁用 Turbo 遥测
  TURBO_TELEMETRY_DISABLED: 1

# 触发条件
on:
  # 推送触发部署流程
  push:
    branches: [main, master] # 只在 main 和 master 分支上触发
    paths:
      # 只在 apps/frontend/react-webpack 目录下的文件发生变化时触发
      - 'apps/frontend/react-webpack/**'
      # 只在 packages 目录下的文件发生变化时触发
      - 'packages/**'
      # 只在该工作流文件发生变化时触发
      - '.github/workflows/react-webpack.yml'
      - '.github/actions/common-steps/action.yml'
  # 拉取请求触发部署流程
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/frontend/react-webpack/**'
      - 'packages/**'
  # 手动触发部署流程
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      rollback:
        description: '是否回滚到上一个版本'
        required: false
        default: false
        type: boolean

# 工作流作业
jobs:
  # 拉取请求测试阶段
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      
      # 运行公共步骤
      - name: Run Common Steps
        id: common
        uses: ./.github/actions/common-steps
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          skip-tests: 'true'
          skip-security-audit: 'false'
          skip-format-check: 'true'

      # 类型检查
      - name: Type Check
        run: |
          echo "🔍 Running type check..."
          pnpm --filter @frontend/react-webpack typecheck

      # 代码风格检查
      - name: Lint Check
        run: |
          echo "✨ Running linting..."
          pnpm --filter @frontend/react-webpack lint

      # 单元测试
      - name: Unit Tests
        run: |
          echo "🧪 Running unit tests..."
          pnpm test:react-webpack -- --coverage

      # 构建测试
      - name: Build Test
        run: |
          echo "🏗️ Testing build..."
          pnpm build:react-webpack

      # 上传测试覆盖率
      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: react-webpack
          name: codecov-react-webpack
          fail_ci_if_error: false

  # 安全扫描阶段
  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # 运行公共步骤
      - name: Run Common Steps
        id: common
        uses: ./.github/actions/common-steps
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          skip-tests: 'true'
          skip-security-audit: 'true'
          skip-format-check: 'true'
          cache-turbo: 'false'

      # 构建 Docker 镜像用于扫描
      - name: Build Docker Image for Scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/react-webpack/Dockerfile
          push: false
          tags: ${{ env.APP_NAME }}:${{ github.sha }}
          load: true
        env:
          DOCKER_BUILDKIT: 1

      # 运行 Trivy 漏洞扫描器
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.APP_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      # 上传 Trivy 扫描结果到 GitHub Security
      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
        env:
          CODE_SCANNING_ENABLED: 'true'

  # 构建和部署阶段
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [security-scan]

    # 环境矩阵支持
    strategy:
      matrix:
        environment: [production, staging]
      fail-fast: false

    environment: ${{ matrix.environment }}

    # 存储触发信息供步骤使用
    env:
      TRIGGER_EVENT: ${{ github.event_name }}
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}

    outputs:
      image_tag: ${{ steps.set-outputs.outputs.image_tag }}
      rollback_image: ${{ steps.set-outputs.outputs.rollback_image }}

    steps:
      # 根据触发条件过滤环境
      # 检查是否应该运行部署
      - name: Check if should run(检查是否应该运行部署)
        id: check
        run: |
          if [ "${{ env.TRIGGER_EVENT }}" == "push" ] && [ "${{ matrix.environment }}" != "production" ]; then
            echo "Skipping deployment to ${{ matrix.environment }} (only production on push)"
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ "${{ env.TRIGGER_EVENT }}" == "workflow_dispatch" ] && [ "${{ matrix.environment }}" != "${{ env.TARGET_ENV }}" ]; then
            echo "Skipping deployment to ${{ matrix.environment }} (target: ${{ env.TARGET_ENV }})"
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "✅ Running deployment to ${{ matrix.environment }}"

      - uses: actions/checkout@v4
        if: steps.check.outputs.should_run == 'true'

      # 设置部署输出
      - name: Set Deployment Outputs(设置部署输出)
        id: set-outputs
        if: steps.check.outputs.should_run == 'true'
        run: |
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "rollback_image=latest" >> $GITHUB_OUTPUT

      # 运行公共步骤
      - name: Run Common Steps(运行公共步骤)
        id: common
        if: steps.check.outputs.should_run == 'true'
        uses: ./.github/actions/common-steps
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
          skip-tests: 'true'
          skip-security-audit: 'true'
          skip-format-check: 'true'
          cache-turbo: 'false'

      - name: Quality Checks(质量检查)
        if: steps.check.outputs.should_run == 'true'
        run: |
          echo "🔍 Running quality checks..."
          echo "Node.js: ${{ steps.common.outputs.node-version }}"
          echo "pnpm: ${{ steps.common.outputs.pnpm-version }}"
          pnpm --filter @frontend/react-webpack typecheck
          pnpm --filter @frontend/react-webpack lint
          echo "✅ Quality checks passed!"

      # 构建依赖包
      - name: Build Dependencies(构建依赖包)
        if: steps.check.outputs.should_run == 'true'
        run: |
          echo "🏗️ Building dependency packages..."
          pnpm --filter @eggshell/ui-antd build
          pnpm --filter @eggshell/ui-tailwind build
          pnpm --filter @eggshell/ui-unocss build
          pnpm --filter @eggshell/core-business-components build
          echo "✅ Dependencies built!"

      # 构建应用
      - name: Build Application(构建应用)
        if: steps.check.outputs.should_run == 'true'
        run: |
          echo "🏗️ Building react-webpack application..."
          pnpm build:react-webpack
          echo "✅ Build completed!"

      # 构建并推送前端镜像
      - name: Build and push frontend image(构建并推送前端镜像)
        if: steps.check.outputs.should_run == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/react-webpack/Dockerfile
          push: true
          tags: |
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.APP_NAME }}:${{ github.sha }}
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.APP_NAME }}:${{ matrix.environment }}
            ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ env.REGISTRY_NAME }}/${{ env.APP_NAME }}:latest
          build-args: |
            NODE_ENV=${{ matrix.environment }}
            VERBOSE=true
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

      # 部署前端到服务器（使用 SSH）
      - name: Deploy to server(部署前端到服务器)
        id: deploy
        if: steps.check.outputs.should_run == 'true'
        uses: appleboy/ssh-action@master
        with:
          # 服务器 IP 地址
          host: ${{ secrets.SERVER_HOST }}
          # 服务器登录用户名
          username: ${{ secrets.SERVER_USERNAME }}
          # 服务器 SSH 私钥
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            DEPLOY_DIR="/var/www/eggshell"
            DEPLOY_USER="${{ secrets.SERVER_USERNAME }}"
            REGISTRY="${{ secrets.ALIYUN_ACR_REGISTRY }}"
            IMAGE_TAG="${{ github.sha }}"
            ENVIRONMENT="${{ matrix.environment }}"
            CONTAINER_NAME="eggshell-react-webpack"

            echo "🚀 Starting deployment to $ENVIRONMENT..."

            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            echo "🔐 Logging into ACR..."
            echo "${{ secrets.ALIYUN_ACR_PASSWORD }}" | docker login -u "${{ secrets.ALIYUN_ACR_USERNAME }}" --password-stdin "$REGISTRY" && echo "✅ Login successful" || (echo "❌ Login failed" && exit 1)

            echo "📝 Setting environment configuration..."
            cat > .env.deploy << 'EOF'
            ALIYUN_REGISTRY=$REGISTRY
            IMAGE_TAG=$IMAGE_TAG
            ENVIRONMENT=$ENVIRONMENT
            DEPLOY_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            DEPLOY_USER=$DEPLOY_USER
            EOF
            chmod 600 .env.deploy

            echo "🏗️ Starting infrastructure services..."
            docker-compose -f docker-compose.db.yml up -d
            docker-compose -f docker-compose.redis.yml up -d

            echo "💾 Backup current container state..."
            if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
              docker inspect "$CONTAINER_NAME" > "backup_${CONTAINER_NAME}_$(date +%s).json" || true
            fi

            echo "⏹️ Stopping existing containers..."
            docker-compose -f docker-compose.react-webpack.yml stop "$CONTAINER_NAME" || true
            docker-compose -f docker-compose.react-webpack.yml rm -f "$CONTAINER_NAME" || true

            echo "📦 Pulling and starting new containers..."
            docker-compose -f docker-compose.react-webpack.yml pull "$CONTAINER_NAME"
            docker-compose -f docker-compose.react-webpack.yml up -d "$CONTAINER_NAME"

            echo "⏳ Waiting for container to be healthy..."
            timeout 120 bash -c 'until docker ps --filter "name=$CONTAINER_NAME" --filter "status=running" --format "{{.Status}}" | grep -q "healthy"; do sleep 5; done' || echo "⚠️ Health check timeout, continuing..."

            echo "✅ Deployment completed! Verifying..."
            docker-compose -f docker-compose.react-webpack.yml ps "$CONTAINER_NAME"

            echo "🎉 Deployment successful!"
            echo "DEPLOY_STATUS=success" >> $GITHUB_ENV

      # 健康检查
      - name: Health Check(健康检查)
        if: steps.deploy.outcome == 'success' && steps.check.outputs.should_run == 'true'
        run: |
          echo "🏥 Performing health check..."
          echo "Waiting for container to be ready..."
          sleep 15

          MAX_RETRIES=6
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES..."
            
            # 尝试多个健康检查端点
            if curl -f -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}/health" 2>/dev/null | grep -q "200"; then
              echo "✅ Health check passed!"
              exit 0
            fi
            
            # 如果 /health 不存在，尝试根路径
            if curl -f -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}/" 2>/dev/null | grep -q "200"; then
              echo "✅ Health check passed (root path)!"
              exit 0
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 15
          done

          echo "⚠️ Health check failed after $MAX_RETRIES attempts"
          echo "This might be expected if the application doesn't have a /health endpoint"
          echo "Container is running, please verify manually at: ${{ secrets.APP_URL }}"
          exit 0

      # 回滚部署（在失败时）
      - name: Rollback on Failure(回滚部署)
        if: failure() && steps.check.outputs.should_run == 'true'
        uses: appleboy/ssh-action@master
        env:
          TURBO_TELEMETRY_DISABLED: 1
        with:
          # 服务器 IP 地址
          host: ${{ secrets.SERVER_HOST }}
          # 服务器登录用户名
          username: ${{ secrets.SERVER_USERNAME }}
          # 服务器 SSH 私钥
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            DEPLOY_DIR="/var/www/eggshell"
            CONTAINER_NAME="eggshell-react-webpack"
            REGISTRY="${{ secrets.ALIYUN_ACR_REGISTRY }}"
            ROLLBACK_IMAGE="${{ needs.build-and-deploy.outputs.rollback_image }}"

            echo "🔄 Starting rollback..."
            cd "$DEPLOY_DIR"

            echo "🔐 Logging into ACR..."
            echo "${{ secrets.ALIYUN_ACR_PASSWORD }}" | docker login -u "${{ secrets.ALIYUN_ACR_USERNAME }}" --password-stdin "$REGISTRY"

            echo "⏹️ Stopping failed deployment..."
            docker-compose -f docker-compose.react-webpack.yml stop "$CONTAINER_NAME" || true
            docker-compose -f docker-compose.react-webpack.yml rm -f "$CONTAINER_NAME" || true

            echo "📦 Rolling back to previous version..."
            IMAGE_TAG="$(grep 'IMAGE_TAG=' .env.deploy 2>/dev/null | cut -d'=' -f2)"
            if [ -n "$IMAGE_TAG" ]; then
              sed -i "s/IMAGE_TAG=.*/IMAGE_TAG=$ROLLBACK_IMAGE/" .env.deploy
            fi

            docker-compose -f docker-compose.react-webpack.yml pull "$CONTAINER_NAME"
            docker-compose -f docker-compose.react-webpack.yml up -d "$CONTAINER_NAME"

            echo "✅ Rollback completed!"

      # 通知部署状态（成功或失败）
      # - name: Notify Deployment Status(通知部署状态)
      #   if: always() && steps.check.outputs.should_run == 'true' && secrets.SLACK_WEBHOOK_URL != ''
      #   uses: slackapi/slack-github-action@v2
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #   with:
      #     webhook: ${{ env.SLACK_WEBHOOK_URL }}
      #     webhook-type: INCOMING_WEBHOOK
      #     payload: |
      #       {
      #         "text": "${{ job.status == 'success' && '✅' || '❌' }} Deployment ${{ job.status }}",
      #         "blocks": [
      #           {
      #             "type": "header",
      #             "text": {
      #               "type": "plain_text",
      #               "text": "${{ job.status == 'success' && '✅ 部署成功' || '❌ 部署失败' }} - ${{ env.APP_NAME }}",
      #               "emoji": true
      #             }
      #           },
      #           {
      #             "type": "section",
      #             "fields": [
      #               {
      #                 "type": "mrkdwn",
      #                 "text": "*Environment:*\n${{ matrix.environment }}"
      #               },
      #               {
      #                 "type": "mrkdwn",
      #                 "text": "*Status:*\n${{ job.status }}"
      #               },
      #               {
      #                 "type": "mrkdwn",
      #                 "text": "*Image Tag:*\n\`${{ github.sha }}\`"
      #               },
      #               {
      #                 "type": "mrkdwn",
      #                 "text": "*Author:*\n${{ github.actor }}"
      #               }
      #             ]
      #           },
      #           {
      #             "type": "section",
      #             "text": {
      #               "type": "mrkdwn",
      #               "text": "*Repository:* ${{ github.repository }}\n*Commit:* ${{ github.event.head_commit.message }}"
      #             }
      #           },
      #           {
      #             "type": "actions",
      #             "elements": [
      #               {
      #                 "type": "button",
      #                 "text": {
      #                   "type": "plain_text",
      #                   "text": "查看 Workflow",
      #                   "emoji": true
      #                 },
      #                 "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
      #                 "style": "${{ job.status == 'success' && 'primary' || 'danger' }}"
      #               },
      #               {
      #                 "type": "button",
      #                 "text": {
      #                   "type": "plain_text",
      #                   "text": "查看 Commit",
      #                   "emoji": true
      #                 },
      #                 "url": "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
      #               }
      #             ]
      #           }
      #         ]
      #       }
      #   continue-on-error: true

      # 创建部署摘要
      - name: Create Deployment Summary(创建部署摘要)
        if: always() && steps.check.outputs.should_run == 'true'
        run: |
          echo "## 📊 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ matrix.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: ${{ secrets.ALIYUN_ACR_REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY_NAME }}/${{ env.APP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy Time**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
