services:
  # 时序数据库：存储性能指标 (FCP, LCP 等)
  eggshell-influxdb:
    image: influxdb:2.8-alpine
    container_name: perf-monitor-influxdb
    ports:
      - '8086:8086'
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=influxdb
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=my-org
      - DOCKER_INFLUXDB_INIT_BUCKET=web_perf
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb-data:/var/lib/influxdb2

volumes:
  influxdb-data:

networks:
  eggshell-network:
    external: true
    name: eggshell-network