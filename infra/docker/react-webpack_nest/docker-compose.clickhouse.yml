services:
  eggshell-clickhouse:
    image: clickhouse/clickhouse-server:latest-alpine
    container_name: eggshell-clickhouse
    ports:
      - '8123:8123'
      - '9000:9000'
    environment:
      CLICKHOUSE_DB: perf_monitor
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: test123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - eggshell-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8123/ping']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  clickhouse_data:
  clickhouse_logs:

networks:
  eggshell-network:
    external: true
    name: eggshell-network