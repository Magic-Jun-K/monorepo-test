services:
  eggshell-bmap-postgresql:
    image: bitnami/postgresql:latest
    container_name: eggshell-bmap-postgresql
    ports:
      - '5432:5432'
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=test123
      - POSTGRESQL_DATABASE=bmap-nest
      # 添加以下配置使PostgreSQL监听所有地址
      - POSTGRESQL_POSTGRES_PASSWORD=test123
      - POSTGRESQL_LISTEN_ADDRESSES=*
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      eggshell-bmap-network:
        aliases:
          - localhost
          - 127.0.0.1

  # 添加 MongoDB 服务 (内存优化配置)
  eggshell-bmap-mongodb:
    image: mongo:8.0
    container_name: eggshell-bmap-mongodb
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    # volumes:
    #   - ../mongodb_data:/data/db
    command: >
      mongod
      --wiredTigerCacheSizeGB 0.25
      --syncdelay 60
      --slowms 10000
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      eggshell-bmap-network:
        aliases:
          - localhost
          - 127.0.0.1
    
  # Redis 缓存服务
  eggshell-bmap-redis:
    container_name: eggshell-bmap-redis
    image: redis:8-alpine
    environment:
      - REDIS_PORT=6379
      - REDIS_PASSWORD=test123
    # volumes:
    #   - redis_data:/data
    ports:
      - '6379:6379'
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eggshell-bmap-network

networks:
  eggshell-bmap-network:
    driver: bridge

# 单行命令docker run -d --name eggshell-baiduMap-postgresql -p 5432:5432 -e POSTGRESQL_USERNAME=postgres -e POSTGRESQL_PASSWORD=test123 -e POSTGRESQL_DATABASE=bmap-nest -v ./postgresql:/bitnami/postgresql bitnami/postgresql:latest